<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Психіатрія та наркологія — тест</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a22; --surface2: #1e2430;
    --border: rgba(255,255,255,0.08); --accent: #a855f7; --accent2: #ec4899;
    --success: #2ddb8a; --danger: #ff5c5c; --text: #eef0f6; --muted: #8b93a8;
    --radius: 14px;
  }
  body { font-family: 'Golos Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px 48px; }
  #app { width: 100%; max-width: 720px; }
  .app-header { text-align: center; padding: 48px 0 36px; }
  .app-header .icon { font-size: 48px; display: block; margin-bottom: 16px; }
  .app-header h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(18px, 4vw, 26px); font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .app-header p { color: var(--muted); font-size: 15px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
  .stat-card .num { font-family: 'Unbounded', sans-serif; font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn { display: block; width: 100%; padding: 16px 24px; font-family: 'Golos Text', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 13px; padding: 10px; }
  .btn-ghost:hover { color: var(--text); }
  .btn + .btn { margin-top: 10px; }
  .progress-wrap { background: var(--surface); border-radius: 100px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s ease; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .quiz-meta .counter { font-family: 'Unbounded', sans-serif; font-size: 11px; color: var(--muted); }
  .score-row { display: flex; gap: 16px; }
  .score-ok { color: var(--success); font-size: 13px; font-weight: 600; }
  .score-fail { color: var(--danger); font-size: 13px; font-weight: 600; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
  .q-tag { font-size: 11px; color: var(--accent); font-family: 'Unbounded', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .q-text { font-size: 16px; line-height: 1.7; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .opt-btn { display: flex; align-items: flex-start; gap: 14px; width: 100%; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Golos Text', sans-serif; font-size: 14px; line-height: 1.5; cursor: pointer; text-align: left; transition: all 0.18s; }
  .opt-btn:hover:not(:disabled) { background: var(--surface2); border-color: rgba(255,255,255,0.2); transform: translateX(3px); }
  .opt-btn:disabled { cursor: default; }
  .opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); transition: all 0.18s; }
  .opt-btn.correct { background: rgba(45,219,138,0.12); border-color: rgba(45,219,138,0.4); }
  .opt-btn.correct .opt-letter { background: var(--success); color: #000; }
  .opt-btn.wrong { background: rgba(255,92,92,0.12); border-color: rgba(255,92,92,0.4); }
  .opt-btn.wrong .opt-letter { background: var(--danger); color: #fff; }
  .feedback { padding: 14px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 500; margin-bottom: 16px; display: none; }
  .feedback.ok { background: rgba(45,219,138,0.12); border: 1px solid rgba(45,219,138,0.3); color: var(--success); }
  .feedback.fail { background: rgba(255,92,92,0.12); border: 1px solid rgba(255,92,92,0.3); color: #ff8080; }
  .results-header { text-align: center; padding: 32px 0 24px; }
  .result-emoji { font-size: 56px; display: block; margin-bottom: 16px; }
  .result-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 15px; }
  .result-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
  .result-card .big { font-family: 'Unbounded', sans-serif; font-size: 32px; font-weight: 700; }
  .result-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .result-card.ok .big { color: var(--success); }
  .result-card.fail .big { color: var(--danger); }
  .screen { display: none; }
  .screen.active { display: block; }
  @media (max-width: 480px) { .q-text { font-size: 15px; } .opt-btn { font-size: 13px; padding: 12px 14px; } }
</style>
</head>
<body>
<div id="app">
  <div id="start-screen" class="screen active">
    <div class="app-header">
      <span class="icon">🧠</span>
      <h1>Психіатрія та наркологія</h1>
      <p>Тести для студентів IV курсу медичного факультету</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">340</div><div class="label">Питань</div></div>
      <div class="stat-card"><div class="num">5</div><div class="label">Варіантів</div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.6;">
      Правильна відповідь завжди перша — тут вона перемішується випадково при кожному питанні.
    </div>
    <button class="btn btn-primary" onclick="startQuiz('all')">📋 По порядку (1 → 340)</button>
    <button class="btn btn-secondary" onclick="startQuiz('random')">🔀 Випадковий порядок</button>
    <div id="resume-wrap" style="display:none; margin-top:10px;">
      <button class="btn btn-ghost" id="resume-btn" onclick="resumeQuiz()"></button>
    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <div class="quiz-meta">
      <span class="counter" id="q-counter">Питання 1/340</span>
      <div class="score-row">
        <span class="score-ok" id="score-ok">✓ 0</span>
        <span class="score-fail" id="score-fail">✗ 0</span>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="q-card">
      <div class="q-tag" id="q-tag">Питання #1</div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQ()">Наступне →</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="quitQuiz()">Зупинитися</button>
  </div>

  <div id="results-screen" class="screen">
    <div class="results-header">
      <span class="result-emoji" id="res-emoji">🎉</span>
      <div class="result-title" id="res-title">Тест завершено!</div>
      <div class="result-sub" id="res-sub"></div>
    </div>
    <div class="result-scores">
      <div class="result-card ok"><div class="big" id="res-ok">0</div><div class="lbl">Правильних</div></div>
      <div class="result-card fail"><div class="big" id="res-fail">0</div><div class="lbl">Неправильних</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz('all')">По порядку спочатку</button>
    <button class="btn btn-secondary" onclick="startQuiz('random')">Випадковий порядок</button>
    <button class="btn btn-ghost" id="retry-wrong-btn" style="display:none" onclick="retryWrong()"></button>
  </div>
</div>

<script>
const QDATA=[[1,"Найтиповіша когнітивна ознака судинної деменції:",["Ступінчасте погіршення з “плато”","Рання афазія без інсультів","Ранній тотальний амнестичний синдром без неврології","Рання галюцинаторика без дефіциту","Постійно рівномірне прогресування"]],[2,"Для судинного ураження більш характерно:",["Флуктуації уваги й ясності свідомості","Постійна стабільна увага","Рання тотальна апраксія без парезів","Виключно маячення величі","Відсутність соматичних скарг"]],[3,"Псевдобульбарний синдром найчастіше асоційований з:",["Дисциркуляторною енцефалопатією/лакунарними інфарктами","Панічним розладом","БАР","Шизофренією","Гострим стресом"]],[4,"Ознака “лобної” дисфункції при судинному процесі:",["Порушення планування, персеверації","Рання зорово-просторова агнозія як єдина","Ізольована гіпермнезія","Тільки фобії","Лише анорексія"]],[5,"Стан з різкими коливаннями свідомості у літнього після інфекції:",["Делірій","Дистимія","Гіпоманія","Анорексія","Соціофобія"]],[6,"Найчастіша причина делірію в геріатрії:",["Інфекція/інтоксикація/метаболічні зсуви","“Чиста” шизофренія","Психопатія","Романтична травма","Істерія"]],[7,"Для делірію характерно:",["Переважно зорові галюцинації + дезорієнтація","Повна орієнтація","Стійка систематизована маячня без порушення свідомості","Тільки обсесії","Відсутність соматовегетативних змін"]],[8,"Судинна депресія (“late-life”):",["Часто з апатією, психомоторною загальмованістю, когнітивним дефіцитом","Завжди з піднесеним настроєм","Тільки з галюцинаціями","Без соматичних скарг","Без ризику суїциду"]],[9,"Ознака, що підсилює підозру на судинний генез:",["Вогнищева неврологічна симптоматика + фактори ризику","Початок у підлітковому віці","Тільки сімейний конфлікт","Відсутність гіпертонії у 80 років","Лише “психологічні” скарги"]],[10,"“Сутінкові” стани у літніх частіше при:",["Судинних/органічних ураженнях, епілепсії","Вітамінній профілактиці","Дитячих інфекціях без ураження мозку","Фобіях","Гіпертиреозі без ускладнень"]],[11,"Пресенильний вік умовно:",["45–65 років","18–25","25–35","10–18","Після 90"]],[12,"Сенильний (старечий) психоз частіше проявляється:",["Параноїдними ідеями, підозрілістю, “крадуть/отруюють”","Лише кататонією","Лише манією","Лише панікою","Лише розладами харчової поведінки"]],[13,"Хвороба Альцгеймера типово починається з:",["Порушення пам’яті на поточні події","Ранньої систематизованої маячні без амнезії","Ранньої гіпермнезії","Ранньої епілепсії як єдиного симптому","Ранньої залежності від алкоголю"]],[14,"Для Альцгеймера більш характерне:",["Поступове рівномірне прогресування","Ступінчастість з “плато”","Повне відновлення після інсульту","Тільки афективні епізоди без когнітивного дефіциту","Тільки істеричні напади"]],[15,"Для судинної деменції характерні:",["Лакунарність: пам’ять відносно збережена на початку, більше виконавчі функції","Рання тотальна амнезія без критики з перших днів","Рання повна афазія без інсульту","Лише гіпоманія","Лише соматоформні скарги"]],[16,"“Сонячний захід” (погіршення ввечері) частіше при:",["Деменції/деліріозних станах у літніх","ПТСР","ОКР","Панічних атаках у підлітків","Соціофобії"]],[17,"Профіль ризику судинних когнітивних порушень:",["АГ, ЦД, дисліпідемія, куріння, ФП","Тільки алергія","Тільки міопія","Тільки гастрит","Тільки остеохондроз"]],[18,"Ключовий крок при підозрі на делірій:",["Шукати соматичну причину й коригувати її","Одразу психоаналіз","Тільки бесіда з родичами","Ігнорувати температуру","Відразу скасувати всю терапію"]],[19,"Психоз при судинних ураженнях частіше:",["Вторинний до органічного дефіциту/делірію","Ізольована “чиста” парафренія 20 років","Завжди кататонічний","Завжди лише іпохондричний","Не буває"]],[20,"Для інволюційної депресії типово:",["Тривога, ідеї вини/провини, суїцидальні ризики у 45–65","Ейфорія","Тільки тики","Тільки дереалізація","Тільки амнезія"]],[21,"Найнебезпечніший симптом при депресії літнього:",["Суїцидальні думки/наміри","Бажання спати","Сухість шкіри","Легка нудота","Інтерес до читання"]],[22,"Когнітивні скарги при депресії (“псевдодеменція”):",["Поліпшуються при лікуванні депресії","Завжди прогресують незалежно від терапії","Ніколи не змінюються","Завжди є інсульт","Завжди є тремор"]],[23,"Для деменції з тільцями Леві характерно:",["Флуктуації, зорові галюцинації, паркінсонізм","Лише амнезія без галюцинацій","Лише кататонія","Лише істерія","Лише анорексія"]],[24,"“Крадіжка речей сусідами” у старечому віці — це частіше:",["Маячення збитку/крадіжки при сенильному параноїді","Обсесія з критикою","Панічна атака","Фобія висоти","Дисморфофобія"]],[25,"Невідкладно при агресивному делірії:",["Безпека + мінімальні дози антипсихотика + лікування причини","Лише заспокійливі слова","Дати кофеїн","Відправити додому","Не контролювати гідратацію"]],[26,"Порушення ходи “магнітна”, нетримання, когнітивний дефіцит:",["Нормотензивна гідроцефалія (органічний синдром)","ГТР","ОКР","Фобія","Істерія"]],[27,"Після інсульту різко з’явилась плаксивість/сміх без причини:",["Патологічний афект/емоційна лабільність органічного генезу","Манія","Психопатія","Анорексія","Парафренія"]],[28,"Найінформативніше обстеження для судинної патології мозку:",["МРТ головного мозку","Рентген кисті","Флюорографія","Спірографія","УЗД щитоподібної"]],[29,"Ризик делірію зростає при:",["Поліпрагмазії та відміні седативних/алкоголю","Вітамінах","Сніданку","Масажі","Прогулянці"]],[30,"Для старечого марення ревнощів більш типово:",["Органічний фон + підозрілість","Початок у 16 років","Завжди при аутизмі","Безсоння один день","Лише після кави"]],[31,"При деменції перш за все страждає:",["Побутова та соціальна функціональність","Лише сила м’язів","Лише гострота зору","Лише слух","Лише смак"]],[32,"“Критика частково збережена” частіше при:",["Судинних когнітивних порушеннях на ранніх етапах","Тяжкому делірії","Глибокій деменції","Онейроїді","Аменції"]],[33,"Ознака, що проти делірію:",["Чітка орієнтація і стабільна увага","Коливання свідомості","Зорові галюцинації","Вегетативні симптоми","Дезорієнтація"]],[34,"При підозр альності” (ACT):",["Прийняття досвіду + дії відповідно до цінностей","Антибіотик","Детокс","ЕСТ","Налоксон"]],[287,"  При ОКР експозиція без ERP:",["Менш ефективна","Завжди достатня","Завжди шкідлива","Неможлива","Заборонена"]],[288,"  Принцип “не нашкодь”:",["Уникати методів, що підвищують ризики","Примушувати до травматизації","Ігнорувати ризики","Провокувати суїцид","Принижувати"]],[289,"  “Психотерапія першої лінії” при легкій депресії:",["CBT/інтерперсональна терапія","Антипсихотики","Налоксон","Флумазеніл","Антибіотики"]],[290,"  Інтерперсональна терапія (IPT) фокусується на:",["Ролях, стосунках, втраті, конфліктах","Лише дитинстві 0–3","Лише аналізах","Лише медикаментах","Лише фізіотерапії"]],[291,"  Психотерапія при БАР:",["Психоосвіта + ритм-соціальна терапія + CBT як додаток","Замінює нормотиміки","Заборонена","Лише гіпноз","Лише арт"]],[292,"  “Робота з рецидивом” у CBT:",["Вияв тригерів + план дій","Ігнорування тригерів","Самоізоляція","Алкоголь","Відміна лікування"]],[293,"  Коли психотерапія обмежена:",["При гострому делірії/тяжкому психозі без стабілізації","При фобії","При ГТР","При депресії","При ОКР"]],[294,"  Основний показ до психотерапії:",["Психічні розлади з психологічними чинниками/дезадаптацією","Перелом кістки як єдине","Пневмонія як єдине","Аппендицит","Отит"]],[295,"  Принцип доказовості:",["Використовувати методи з доведеною ефективністю","Лише “як відчувається”","Лише традиції","Лише інтуїція","Лише випадок"]],[296,"  Техніка “поведінкова активація” при депресії:",["Повернення до діяльності та приємних занять","Постійний постільний режим","Ізоляція","Алкоголь","Скасування режиму"]],[297,"  Роль “домашніх завдань” у CBT:",["Закріплення навичок у реальному житті","Для покарання","Не потрібні","Шкодять завжди","Замінюють терапію"]],[298,"  Психотерапія при психосоматичних:",["CBT/стрес-менеджмент","Лише антибіотики","Лише діуретики","Лише антипсихотики","Лише гормони"]],[299,"  Основний елемент емпатійної комунікації:",["Активне слухання і віддзеркалення почуттів","Перебивання","Звинувачення","Сарказм","Залякування"]],[300,"  Мета психотерапії при тривожних:",["Зниження уникання і формування навичок саморегуляції","Підвищення уникання","Провокація паніки","Відміна сну","Підвищення температури"]],[301,"Психіатрична допомога вважається добровільною, якщо вона надається:",["На прохання або за згодою самого пацієнта.","На прохання близьких родичів.","За направленням дільничного лікаря терапевта.","За направленням сімейного лікаря.","На прохання дружини або чоловіка."]],[302,"Амбулаторне примусове лікування може встановлюватись особі, що страждає:",["Затяжний психічний розлад з тяжкими стійкими хворобливими проявами, які часто загострюються.","Будь-який психічний розлад.","Хронічний психічний розлад.","Зниження інтелекту (слабоумство).","Непсихотичний психічний розлад."]],[303,"Рішення про необхідність встановлення амбулаторного примусового лікування приймається:",["Тільки судом.","Лікарем психіатром.","Комісією лікарів-психіатрів (ЛКК).","Головним лікарем (завідувачем) психоневрологічного диспансеру.","Тільки прокурором."]],[304,"Факт знаходження особи на диспансерному спостереженні:",["Не має встановлених чинним законодавством юридичних наслідків.","Є підставою для обмеження її прав у соціальній сфері.","Дає їй право на пільги при придбанні ліків.","Позбавляє її права на відмову від госпіталізації в психіатричний стаціонар.","Позбавляє її права на відмову від психіатричного лікування."]],[305,"Підставами для госпіталізації в психіатричний стаціонар є:",["Наявність у особи психічного розладу і рішення лікаря-психіатра.","Прохання рідних хворого.","Рішення головного лікаря психоневрологічного диспансеру.","Знаходження хворого під диспансерним спостереженням.","Наявність наслідків (деменції) психічного розладу."]],[306,"Госпіталізація вважається добровільною, якщо вона проводиться:",["За письмовим проханням чи письмової згоди самого хворого.","За усним проханням чи згоди родичів хворого.","За письмовим проханням чи письмової згоди родичів хворого.","Із санкції органів Міністерства внутрішніх справ.","Із санкції прокуратури."]],[307,"Підставами для примусової госпіталізації є:",["Наявність тяжкого психічного розладу, що зумовлює небезпеку хворого для себе або оточуючих.","Наявність хронічного психічного розладу.","Необхідність обстеження в стаціонарних умовах.","Наявність психічного розладу без небезпеки для себе/оточуючих.","Наявність тяжкого хронічного психічного розладу (слабоумство)."]],[308,"Якщо комісія визнала примусову госпіталізацію необґрунтованою:",["Особа підлягає негайній виписці, коли вона не бажає залишатись у стаціонарі.","Особа підлягає негайній виписці.","Особа може бути залишена в стаціонарі до рішення суду.","Особа може бути залишена в стаціонарі проти її бажання до 30 днів.","Особа може бути переведена в інший стаціонар."]],[309,"Визначення психічного розладу — виняткова компетенція:",["Лікаря-психіатра.","Лікаря-невропатолога.","Лікаря-терапевта.","Сімейного лікаря.","Лікаря-нарколога."]],[310,"Диспансерне спостереження передбачає:",["Спостереження стану психічного здоров’я шляхом огляду психіатром та надання необхідної медичної і соціальної допомоги.","Огляд не рідше 1 разу на місяць.","Огляди не рідше 1 разу в 3 місяці.","Щорічні курси інтенсивної терапії в денному стаціонарі.","Надання медичної і соціальної допомоги."]],[311,"Раннє виявлення і лікування для зменшення тривалості та прогресування — це:",["Вторинна профілактика.","Поширеність.","Захворюваність.","Валідність.","Первинна профілактика."]],[312,"Частина населення, уражена хворобою в даний час — це:",["Поширеність.","Захворюваність.","Валідність.","Первинна профілактика.","Вторинна профілактика."]],[313,"Частина населення, що захворіла вперше за проміжок часу — це:",["Захворюваність.","Поширеність.","Валідність.","Первинна профілактика.","Вторинна профілактика."]],[314,"Спроба виявити й усунути причини психічних розладів — це:",["Первинна профілактика.","Поширеність.","Захворюваність.","Валідність.","Вторинна профілактика."]],[315,"Трудова адаптація розумово відсталих легкого ступеню доцільна в:",["Допоміжних школах.","Загальноосвітніх школах.","Лікувально-трудових майстернях.","Інтернатах соціального забезпечення.","В умовах сімейного виховання."]],[316,"Трудова адаптація при тяжкій розумовій відсталості доцільна в:",["Інтернатах соціального забезпечення.","Допоміжних школах.","Загальноосвітніх школах.","Лікувально-трудових майстернях.","В умовах родинного виховання."]],[317,"Виписка хворого після суспільно небезпечних дій (примусові заходи) здійснюється:",["Тільки за рішенням суду.","За його особистою заявою.","За рішенням лікуючого лікаря.","За рішенням ЛКК.","За рішенням головного лікаря."]],[318,"Право на доступну інформацію про права/розлад/лікування мають:",["Всі особи з психічними розладами при наданні психіатричної допомоги.","Тільки під диспансерним спостереженням.","Тільки госпіталізовані.","Тільки ті, хто отримує психотропи.","Тільки ті, до кого застосовують примусові заходи."]],[319,"Рішення про непридатність до окремих видів діяльності приймається:",["Лікарською комісією, уповноваженою органом охорони здоров’я.","Лікарем будь-якої спеціальності.","Лікарем-психіатром.","Прокурором.","Судом."]],[320,"Відомості про психічне здоров’я громадянина мають право запрошувати:",["Нікому не дано такого права.","Керівництво закладу, де працює ця особа.","Сусіди.","Сімейний лікар.","Судово-слідчі органи."]],[321,"Особа може отримати відомості про стан психічного здоров’я:",["За її особистим проханням або проханням законного представника.","Тільки по запиту установи/організації.","Тільки по запиту суду/прокурора.","За проханням найближчих родичів.","Тільки по запиту органу охорони здоров’я."]],[322,"Згода на лікування неповнолітнього до 15 років дається:",["Законним представником.","Самою особою письмово.","Самою особою усно.","Одним із родичів.","Судом."]],[323,"Згода на стаціонарне лікування недієздатної особи дається:",["Законним представником.","Самою особою письмово.","Самою особою усно.","Судом.","Прокуратурою."]],[324,"Відмова від лікування:",["Оформляється записом у меддокументації за підписом особи/представника та лікаря-психіатра.","Приймається психіатром усно.","Оформляється за підписом особи/представника.","Оформляється за підписом лікаря-психіатра.","Оформляється за підписом сімейного лікаря."]],[325,"Добровільний психіатричний огляд проводиться:",["На прохання або за згодою особи, яка обстежується.","За усним проханням/згодою родичів.","За письмовою заявою родичів.","Тільки з письмової згоди особи.","Із санкції суду незалежно від згоди."]],[326,"Право на надання психіатричної допомоги має:",["Лікар-психіатр з підтвердженою кваліфікацією.","Будь-який лікар із вищою медосвітою.","Сімейний лікар.","Невропатолог.","Медичний психолог."]],[327,"Хворий 37 років, лікар… Яке дослідження найбільш інформативне для уточнення діагнозу?",["Клініко-психопатологічне","Комп’ютерна томографія головного мозку","Вміст алкоголю в крові","Дослідження ферментів сироватки крові","Експериментально-психологічне"]],[328,"Який метод є основним методом дослідження психічнохворих?",["Клініко-психопатологічний","Молекулярно-генетичний","Патопсихологічний","Експериментально-психологічний","Катамнестичний"]],[329,"Який параклінічний метод визначає захворюваність/хворобливість/ризик у популяції?",["Епідеміологічний","Генетичний","Патопсихологічний","Експериментально-психологічний","Клініко-психопатологічний"]],[330,"Нейрорентгенологічний метод з радіонуклідами для оцінки метаболізму/рецепторів:",["Позитронно-емісійна томографія","Магнітно-резонансна томографія","Пневмоенцефалографія","Комп’ютерна томографія","Ангіографія судин мозку"]],[331,"Хворий 52 років, етильований бензин… Які дослідження найінформативніші?",["Лабораторні","Нейрорентгенологічні","Нейрофізіологічні","Патопсихологічні","Генетичні"]],[332,"Хворий 47 років… “упізнав злочинця”… Яке дослідження найбільш інформативне?",["Вміст алкоголю в крові","Патопсихологічне","Комп’ютерна томографія голови","Експериментально-психологічне","Ферменти сироватки крові"]],[333,"Психічні розлади з емоційною нестійкістю, конфліктністю, але зі збереженням критики — це:",["Непсихотичні","Дефектно-органічні","Психотичні","Соматогенні","Поведінкові"]],[334,"Тяжкі розлади з маяченням/галюцинаціями/відсутністю критики — це:",["Психотичні","Непсихотичні","Дефектно-органічні","Соматогенні","Поведінкові"]],[335,"Хвора 27 років після інфекційного відділення… Які методи потрібні?",["Лабораторні","Генетичні","Нейрофізіологічні","Нейрорентгенологічні","Патопсихологічні"]],[336,"У хворого 12 років генералізовані судомні напади… Найінформативніше:",["Електроенцефалографія","Ехоенцефалоскопія","Реоенцефалографія","Пневмоенцефалографія","Комп’ютерна томографія голови"]],[337,"Хвора 24 роки… “не хочу жити”. Ваша тактика:",["Госпіталізувати у психіатричний стаціонар","Призначити амбулаторне лікування","Направити на консультацію до психолога","Рекомендувати санаторно-курортне лікування","Госпіталізувати у неврологічний стаціонар"]],[338,"Пацієнтка після сексуального насильства, психомоторне збудження. Який препарат доцільно застосувати?",["Розчин аміназину 2 мл 2,5%","Розчин амітриптиліну 2 мл 1%","Розчин димедролу 1 мл 1%","Розчин пірацетаму 5 мл 20%","Розчин анальгіну 2 мл 50%"]],[339,"Пацієнтка 15 років після зґвалтування, суїцидальні висловлювання. Ваша тактика:",["Госпіталізувати у психіатричний стаціонар","Госпіталізувати у реанімаційне відділення","Лікувати амбулаторно","Направити на консультацію до психотерапевта","Ізолювати хвору в окрему палату"]],[340,"Хлопець 15 років із поведінковими розладами на фоні сімейної ситуації. Яку терапію застосувати?",["Психотерапію (сімейну, індивідуальну)","Поведінкову","Нейролептичну","Інсуліно-шокову","Комплексну в умовах виправного закладу"]]];
let deck=[],cur=0,ok=0,fail=0,wrongItems=[],answered=false,savedState=null;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildDeck(src){return src.map(r=>{const opts=[...r[2]];const correct=opts[0];const shuffled=shuffle(opts);return{n:r[0],q:r[1],opts:shuffled,correct};});}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function startQuiz(mode){const src=mode==='random'?shuffle(QDATA):[...QDATA];deck=buildDeck(src);cur=0;ok=0;fail=0;wrongItems=[];show('quiz-screen');renderQ();}
function resumeQuiz(){if(!savedState)return;deck=savedState.deck;cur=savedState.cur;ok=savedState.ok;fail=savedState.fail;wrongItems=savedState.wrongItems;show('quiz-screen');renderQ();}
function quitQuiz(){savedState={deck:[...deck],cur,ok,fail,wrongItems:[...wrongItems]};const btn=document.getElementById('resume-btn');btn.textContent=`▶ Продовжити (питання ${cur+1}/${deck.length})`;document.getElementById('resume-wrap').style.display='block';show('start-screen');}
function retryWrong(){deck=buildDeck(wrongItems.map(q=>[q.n,q.q,[q.correct,...q.opts.filter(o=>o!==q.correct)]]));cur=0;ok=0;fail=0;wrongItems=[];show('quiz-screen');renderQ();}
function renderQ(){
  if(cur>=deck.length){showResults();return;}
  answered=false;
  const q=deck[cur];const total=deck.length;
  document.getElementById('q-counter').textContent=`Питання ${cur+1}/${total}`;
  document.getElementById('q-tag').textContent=`#${q.n}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('score-ok').textContent=`✓ ${ok}`;
  document.getElementById('score-fail').textContent=`✗ ${fail}`;
  document.getElementById('progress').style.width=`${(cur/total)*100}%`;
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  const letters=['A','B','C','D','E'];
  const cont=document.getElementById('options');cont.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>pick(opt===q.correct,btn,q);
    cont.appendChild(btn);
  });
}
function pick(isOk,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>{b.disabled=true;if(b.querySelector('span:last-child').textContent===q.correct)b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(isOk){ok++;btn.classList.add('correct');fb.className='feedback ok';fb.textContent='✓ Правильно!';}
  else{fail++;wrongItems.push(q);btn.classList.add('wrong');fb.className='feedback fail';fb.textContent='✗ Неправильно. Правильна відповідь: '+q.correct;}
  fb.style.display='block';
  document.getElementById('score-ok').textContent=`✓ ${ok}`;
  document.getElementById('score-fail').textContent=`✗ ${fail}`;
  const nb=document.getElementById('next-btn');nb.style.display='block';
  nb.textContent=cur+1>=deck.length?'Завершити ✓':'Наступне →';
}
function nextQ(){cur++;renderQ();}
function showResults(){
  show('results-screen');
  const total=deck.length;const pct=Math.round((ok/total)*100);
  document.getElementById('res-emoji').textContent=pct>=80?'🎉':pct>=60?'👍':'📚';
  document.getElementById('res-title').textContent=pct>=80?'Відмінно!':pct>=60?'Непогано!':'Потрібно повторити!';
  document.getElementById('res-sub').textContent=`${ok} з ${total} правильних — ${pct}%`;
  document.getElementById('res-ok').textContent=ok;document.getElementById('res-fail').textContent=fail;
  const rwb=document.getElementById('retry-wrong-btn');
  if(wrongItems.length>0){rwb.style.display='block';rwb.textContent=`🔁 Повторити помилки (${wrongItems.length})`;}
  else rwb.style.display='none';
}
</script>
</body>
</html>
